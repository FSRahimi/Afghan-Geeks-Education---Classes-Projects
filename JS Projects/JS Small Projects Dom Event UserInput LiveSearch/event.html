<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    <title>Event</title>
  </head>
  <body class="bg-gray-100 p-10">
    <div class="max-w-sm mx-auto bg-white p-5 rounded shadow">
      <form id="form">
        <input
          id="name"
          type="text"
          placeholder="Enter your name"
          class="w-full border p-2 rounded mb-3"
        />

        <button class="bg-blue-500 text-white w-full p-2 rounded">Add</button>
      </form>

      <p class="mt-3">Preview: <span id="preview">-</span></p>

      <p class="mt-1 text-sm text-gray-500">
        Pressed key: <span id="key">-</span>
      </p>
    </div>

    <div id="output" class="max-w-sm mx-auto mt-5 space-y-2"></div>

    <script>
      let form = document.getElementById("form");
      let input = document.getElementById("name");
      let preview = document.getElementById("preview");
      let key = document.getElementById("key");
      let list = document.getElementById("output");

      input.addEventListener("input", function () {
        preview.innerText = input.value;
      });

      document.addEventListener("keydown", function (e) {
        key.innerText = e.key;
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        let task = input.value;

        if (task === "") return;

        let li = document.createElement("li");

        li.className =
          "flex justify-between items-center bg-blue-50 p-2 rounded";

        li.innerHTML = `
    <span>${task}</span>
    <button class="delete bg-red-400 text-white px-2 rounded">X</button>
  `;

        list.appendChild(li);
        input.value = "";
        preview.innerText = "...";
      });

      list.addEventListener("click", function (e) {
        if (e.target.classList.contains("delete")) {
          e.target.parentElement.remove();
        }
      });

      list.addEventListener("mouseover", function (e) {
        let item = e.target.closest("li");

        if (item) {
          item.classList.add("bg-green-200");
        }
      });

      list.addEventListener("mouseout", function (e) {
        let item = e.target.closest("li");

        if (item) {
          item.classList.remove("bg-green-200");
        }
      });
    </script>
  </body>
</html>
