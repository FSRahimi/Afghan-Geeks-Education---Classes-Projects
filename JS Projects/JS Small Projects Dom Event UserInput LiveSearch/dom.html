<!doctype html>
<html>
  <head>
    <title>DOM Tailwind Project</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 flex justify-center items-center h-screen">
    <div class="bg-white p-6 rounded-lg shadow-lg w-96 text-center">
      <h2 id="title" class="text-2xl font-bold mb-3">My Post</h2>

      <p class="message text-gray-500 mb-4">No notifications</p>

      <button
        id="notifyBtn"
        class="bg-blue-500 text-white px-4 py-2 rounded w-full mb-2"
      >
        Show Notification
      </button>

      <button id="likeBtn" class="bg-gray-300 px-4 py-2 rounded w-full">
        Like
      </button>

      <div id="box" class="mt-4"></div>

      <script>
        let notifyBtn = document.getElementById("notifyBtn");

        let message = document.querySelector(".message");

        let likeBtn = document.getElementById("likeBtn");
        let box = document.getElementById("box");

        notifyBtn.onclick = function () {
          message.innerText = "You have new notification";

          message.style.color = "blue";
          message.style.fontSize = "20px";
        };

        likeBtn.onclick = function () {
          box.innerHTML = "<h3 class='text-red-500 font-bold'> Like it </h3>";

          likeBtn.style.backgroundColor = "red";
          likeBtn.style.color = "white";
        };
      </script>
    </div>
  </body>
</html>
