<!doctype html>
<html lang="en">


<!-- Hi dear Afifa jan That is a Great Project Thank you so much for Doing it, Well done☘️-->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Book Library</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="header-inner">
        <div class="header-text">
          <span class="header-label">&#9679; Digital Collection</span>
          <h1 class="header-title">Smart Book Library</h1>
          <p class="header-desc">
            Manage your personal reading collection — add, search, filter, and
            organise your books in one place.
          </p>
        </div>
        <div class="header-stat">
          <span class="stat-number" id="totalBooks">0</span>
          <span class="stat-label">Books in Library</span>
        </div>
      </div>
    </header>

    <main class="main">
      <!-- ADD BOOK FORM -->
      <section class="section form-section">
        <h2 class="section-title">Add a New Book</h2>
        <div class="form-grid">
          <div class="field">
            <label for="title">Book Title</label>
            <input type="text" id="title" placeholder="e.g. The Great Gatsby" />
          </div>
          <div class="field">
            <label for="author">Author Name</label>
            <input
              type="text"
              id="author"
              placeholder="e.g. F. Scott Fitzgerald"
            />
          </div>
          <div class="field">
            <label for="category">Category</label>
            <select id="category">
              <option value="">Select category…</option>
              <option value="Fiction">Fiction</option>
              <option value="Non-Fiction">Non-Fiction</option>
              <option value="Science">Science</option>
              <option value="Technology">Technology</option>
              <option value="History">History</option>
              <option value="Biography">Biography</option>
              <option value="Philosophy">Philosophy</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="field">
            <label for="year">Publication Year</label>
            <input
              type="number"
              id="year"
              placeholder="e.g. 2024"
              min="1000"
              max="2099"
            />
          </div>
        </div>
        <button class="btn btn-primary" id="addBookBtn">+ Add Book</button>
        <p class="form-error" id="formError"></p>
      </section>

      <!-- SEARCH & FILTER -->
      <section class="section controls-section">
        <div class="controls">
          <div class="search-wrap">
            <span class="search-icon">&#128269;</span>
            <input
              type="text"
              id="searchInput"
              placeholder="Search by title…"
            />
          </div>
          <select class="filter-select" id="filterCategory">
            <option value="">All Categories</option>
            <option value="Fiction">Fiction</option>
            <option value="Non-Fiction">Non-Fiction</option>
            <option value="Science">Science</option>
            <option value="Technology">Technology</option>
            <option value="History">History</option>
            <option value="Biography">Biography</option>
            <option value="Philosophy">Philosophy</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </section>

      <!-- BOOKS GRID -->
      <section class="section books-section">
        <div class="books-grid" id="booksGrid">
          <!-- Cards injected by JS -->
        </div>
        <p class="empty-msg" id="emptyMsg" style="display: none">
          No books found. Try a different search or add a new book!
        </p>
      </section>
    </main>

    <footer class="footer">
      <p>Smart Book Library &mdash; Web Dev Group B &bull; Week 16</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
