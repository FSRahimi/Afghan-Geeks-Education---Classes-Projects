<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - GreenTech Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow">
      <div class="container mx-auto flex justify-between items-center p-5">
        <h1 class="text-2xl font-bold text-green-600">GreenTech</h1>
        <nav class="space-x-6 font-medium">
          <a href="index.html" class="hover:text-green-600 transition">Home</a>
          <a href="about.html" class="hover:text-green-600 transition">About</a>
          <a href="services.html" class="hover:text-green-600 transition"
            >Services</a
          >
          <a href="contact.html" class="hover:text-green-600 transition"
            >Contact</a
          >
        </nav>
      </div>
    </header>

    <section class="container mx-auto py-20 max-w-xl">
      <h2 class="text-4xl font-bold text-center mb-10">Contact Us</h2>

      <p class="text-center">
        If you want to work with GreenTech Solutions, please contact us.
      </p>
    </section>

    <section class="m-10">
      <form class="bg-white p-5 rounded-xl shadow space-y-6">
        <div>
          <label class="block mb-1">Name</label>
          <input type="text" class="w-full border p-3 rounded" />
        </div>

        <div>
          <label class="block mb-1">Email</label>
          <input type="email" class="w-full border p-3 rounded" />
        </div>

        <div>
          <label class="block mb-1">Message</label>
          <textarea class="w-full border p-3 rounded"></textarea>
        </div>

        <button
          class="bg-green-300 text-white px-6 py-3 rounded hover:bg-green-500 transition w-full"
          type="submit"
        >
          Send Message
        </button>
      </form>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white text-center p-6 mt-10">
      <p>© 2026 GreenTech Solutions</p>
      <p class="text-sm text-gray-400">
        Innovating Technology for a Greener World
      </p>
    </footer>
  </body>
</html>
