<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hover Effects Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="title">CSS Hover Effects Showcase</h1>

    <!-- Buttons Section -->
    <section>
      <h2>Button Hover</h2>
      <button class="btn">Hover Me</button>
      <button class="btn-outline">Outline Button</button>
    </section>

    <!-- Links Section -->
    <section>
      <h2>Link Hover</h2>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </section>

    <!-- Image Hover -->
    <section>
      <h2>Image Hover</h2>
      <img src="https://picsum.photos/300/200" class="img-hover" />
    </section>

    <!-- Card Hover -->
    <section class="card-container">
      <h2>Card Hover</h2>
      <div class="card">
        <h3>Card Title</h3>
        <p>This card has hover animation.</p>
      </div>
    </section>

    <!-- Gallery Hover -->
    <section>
      <h2>Gallery Hover</h2>
      <div class="gallery">
        <div class="gallery-item">
          <img src="https://picsum.photos/300?1" />
          <div class="overlay">Image 1</div>
        </div>
        <div class="gallery-item">
          <img src="https://picsum.photos/300?2" />
          <div class="overlay">Image 2</div>
        </div>
        <div class="gallery-item">
          <img src="https://picsum.photos/300?3" />
          <div class="overlay">Image 3</div>
        </div>
      </div>
    </section>
  </body>
</html>
