<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation</title>

    <style>
      body {
        color: rgb(114, 73, 23);
      }

      .ball {
        width: 50px;
        height: 50px;
        background: orange;
        border-radius: 50%;
        margin: 50px auto;
        animation: bounce 1s infinite;
      }
      @keyframes bounce {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-150px);
        }
        100% {
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="ball">
      <h3>Hi</h3>
    </div>
  </body>
</html>
