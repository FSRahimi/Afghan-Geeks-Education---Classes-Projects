<!doctype html>
<html>
  <head>
    <title>Flexbox Practice</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="logo">FlexAcademy</div>
      <nav class="nav">
        <a href="#">Home</a>
        <a href="#cards">About</a>
        <a href="#form-section">Services</a>
      </nav>
    </header>

    <!-- MAIN LAYOUT WITH SIDEBAR -->
    <div class="main-layout">
      <aside class="sidebar">
        <h3>Sidebar</h3>
        <ul>
          <li>Dashboard</li>
          <li>Students</li>
          <li>Courses</li>
          <li>Settings</li>
        </ul>
      </aside>

      <section class="content">
        <h2>Content Area</h2>
        <p>This layout uses flex-direction and flex-grow.</p>
      </section>
    </div>

    <!-- CARD SECTION -->
    <section id="cards">
      <div class="card card1">1</div>
      <div class="card card2">2</div>
      <div class="card card3">3</div>
      <div class="card card4">4</div>
      <div class="card card5">5</div>
      <div class="card card6">6</div>
      <div class="card card7">7</div>
      <div class="card card8">8</div>
    </section>

    <!-- TEAM SECTION -->
    <section class="team">
      <div class="member">Member 1</div>
      <div class="member">Member 2</div>
      <div class="member">Member 3</div>
      <div class="member">Member 4</div>
    </section>

    <!-- PRICING SECTION -->
    <section class="pricing">
      <div class="price-card">Basic</div>
      <div class="price-card popular">Standard</div>
      <div class="price-card">Premium</div>
    </section>

    <!-- FORM SECTION -->
    <section id="form-section">
      <form class="form">
        <input type="text" placeholder="Name" />
        <input type="email" placeholder="Email" />
        <input type="text" placeholder="Subject" />
        <button type="submit">Submit</button>
      </form>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <div>© Flexbox Practice</div>
    </footer>
  </body>
</html>
