<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AfghanShop</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <!-- Navbar -->

    <nav class="bg-white shadow">
      <div class="container mx-auto flex justify-between items-center p-4">
        <h1 class="text-2xl font-bold text-indigo-600">AfghanShop</h1>

        <div class="flex gap-6">
          <a href="index.html" class="hover:text-indigo-600">Home</a>
          <a href="products.html" class="hover:text-indigo-600">Products</a>
        </div>
      </div>
    </nav>

    <!-- Hero -->

    <section class="bg-gray-200 text-white py-24 text-center">
      <h2 class="text-5xl text-indigo-600 font-bold mb-6">Online Store</h2>

      <p class="mb-6 text-lg text-black">Discover the best products</p>

      <a
        href="products.html"
        class="bg-white text-indigo-600 px-6 py-3 rounded shadow hover:bg-gray-200"
      >
        Shop Now
      </a>
    </section>

    <!-- Featured Products -->

    <section class="container mx-auto py-16">
      <h2 class="text-3xl font-bold text-center mb-10">Featured Products</h2>

      <div class="grid md:grid-cols-3 gap-8">
        <div class="bg-white p-6 rounded shadow hover:shadow-lg transition">
          <img src="./img/pexels-2149589905-30692084.jpg" class="mb-4" />

          <h3 class="text-xl font-semibold">Perfume</h3>

          <p class="text-gray-600 mb-3">$99</p>

          <a href="product.html" class="text-indigo-600 font-semibold">
            View Product
          </a>
        </div>

        <div class="bg-white p-6 rounded shadow hover:shadow-lg transition">
          <img
            src="./img/pexels-brenda-orlando-359578-6788551.jpg"
            class="mb-4"
          />

          <h3 class="text-xl font-semibold">Perfume</h3>

          <p class="text-gray-600 mb-3">$149</p>

          <a href="product.html" class="text-indigo-600 font-semibold">
            View Product
          </a>
        </div>

        <div class="bg-white p-6 rounded shadow hover:shadow-lg transition">
          <img
            src="./img/pexels-marcieli-kogut-77756386-10924520.jpg"
            class="mb-4"
          />

          <h3 class="text-xl font-semibold">Perfume</h3>

          <p class="text-gray-600 mb-3">$79</p>

          <a href="product.html" class="text-indigo-600 font-semibold">
            View Product
          </a>
        </div>
      </div>
    </section>

    <!-- Newsletter -->

    <section class="bg-gray-200 py-16 text-center">
      <h2 class="text-3xl font-bold mb-4">Join Our Newsletter</h2>

      <input class="p-3 rounded border w-72" placeholder="Enter your email" />

      <button class="bg-indigo-600 text-white px-6 py-3 rounded ml-2">
        Subscribe
      </button>
    </section>

    <!-- Footer -->

    <footer class="bg-gray-900 text-white text-center py-6">
      <p>© 2026 AfghanShop</p>
    </footer>
  </body>
</html>
